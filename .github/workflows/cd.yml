name: CD

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-be-render:
    name: Deploy BE to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Skipping BE deploy."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "BE deploy triggered successfully"

  deploy-fe-vercel:
    name: Deploy FE to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set. Skipping FE deploy."
            exit 0
          fi
          curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "FE deploy triggered successfully"
